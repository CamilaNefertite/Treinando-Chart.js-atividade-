<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            display: flex;
        }
        #myChart, #mySecChart{
            position: relative;
            height: 100vh;
            width: 100vh;
        }
    </style>
  </head>
  <body>
    <div>
      <canvas id="myChart"></canvas>
    </div>

    <div>
      <canvas id="mySecChart"></canvas>
    </div>

  </body>
</html>
<script>
  const labels = ["12:00", "13:00", "14:00", "15:00", "16:00", "17:00"];

  const data = {
    labels: labels,
    datasets: [
      {
        label: "Temperatura",
        backgroundColor: "rgb(255, 99, 132)",
        borderColor: "rgb(255, 99, 132)",
        data: [30, 29, 28, 25, 22, 23],
      },
      {
        label: "Umidade",
        backgroundColor: "rgb(0, 0, 255)",
        borderColor: "rgb(0, 0, 255)",
        data: [80, 82, 80, 85, 80, 83],
      },
    ],
  };


const labels2 = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho"];

  const data2 = {
    labels: labels2,
    datasets: [
      {
        label: "Temperatura Média",
        backgroundColor: "rgb(255, 99, 132)",
        borderColor: "rgb(255, 99, 132)",
        data: [22, 24, 27, 23, 20, 18],
      },
      {
        label: "Umidade Média",
        backgroundColor: "rgb(0, 0, 255)",
        borderColor: "rgb(0, 0, 255)",
        data: [90, 89, 93, 87, 88, 82],
      },
    ],
  };

  const config_grafico1 = {
    type: "line",
    data: data,
    options: {},
  };

    const config_grafico2 = {
    type: "bar",
    data: data2,
    options: {},
  };
</script>

<script>
  const myChart = new Chart(document.getElementById("myChart"), config_grafico1);
  const mySecChart = new Chart(document.getElementById("mySecChart"), config_grafico2);
</script>
