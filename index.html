<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      body {
        display: flex;
      }
      #grafico_linha,
      #grafico_barra {
        position: relative;
        height: 100vh;
        width: 100vh;
      }
    </style>
  </head>
  <body>
    <div>
      <canvas id="grafico_linha"></canvas>
    </div>

    <div>
      <canvas id="grafico_barra"></canvas>
    </div>
  </body>
</html>
<script>
  const labels_1 = ["12:00", "13:00", "14:00", "15:00", "16:00", "17:00"];

  const data_1 = {
    labels: labels_1,
    datasets: [
      {
        label: "Temperatura",
        backgroundColor: "rgb(255, 99, 132)",
        borderColor: "rgb(255, 99, 132)",
        data: [30, 29, 28, 25, 22, 23],
      },
      {
        label: "Umidade",
        backgroundColor: "rgb(0, 0, 255)",
        borderColor: "rgb(0, 0, 255)",
        data: [80, 82, 80, 85, 80, 83],
      },
    ],
  };

  const config_grafico1 = {
    type: "line",
    data: data_1,
    options: {},
  };

  const labels_2 = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho"];

  const data_2 = {
    labels: labels_2,
    datasets: [
      {
        label: "Temperatura Média",
        backgroundColor: "rgb(255, 99, 132)",
        borderColor: "rgb(255, 99, 132)",
        data: [22, 24, 27, 23, 20, 18],
      },
      {
        label: "Umidade Média",
        backgroundColor: "rgb(0, 0, 255)",
        borderColor: "rgb(0, 0, 255)",
        data: [90, 89, 93, 87, 88, 82],
      },
    ],
  };

  const config_grafico2 = {
    type: "bar",
    data: data_2,
    options: {},
  };
</script>

<script>
  const grafico_linha = new Chart(
    document.getElementById("grafico_linha"),
    config_grafico1,
  );
  const grafico_barra = new Chart(
    document.getElementById("grafico_barra"),
    config_grafico2,
  );
</script>
